env:
  max_episode_steps: 50

train:
  total_timesteps: 256
  learning_starts: 32
  batch_size: 32
  buffer_size: 10000
  eval_freq: 128
  checkpoint_freq: 128
  net_arch: [64, 64]

eval:
  monitor:
    episodes: 4
  validation:
    episodes: 4
  test:
    episodes: 4

logging:
  wandb_mode: disabled
  sync_tensorboard: false
